name: ambot_ai
description: "Ambot AI - Your offline AI classroom"
publish_to: 'none'
version: 1.6.2+16

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.5.1
  path_provider: ^2.1.5
  device_info_plus: ^11.2.0
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7
  shared_preferences: ^2.3.5
  llamadart: ^0.6.10
  wakelock_plus: ^1.2.8
  # Permissions
  permission_handler: ^11.3.1
  # Secure storage for API keys
  flutter_secure_storage: ^9.2.2
  # PDF generation
  pdf: ^3.11.1
  # File picker for document upload
  file_picker: ^8.1.2
  # Image picker for camera/gallery
  image_picker: ^1.1.2
  # HTTP for cloud AI
  http: ^1.2.2
  # Share intent for exports
  share_plus: ^10.1.2
  # Open files with default app
  open_file: ^3.5.10
  # Launch URLs
  url_launcher: ^6.3.2
  go_router: ^17.2.3
  webview_flutter: ^4.10.0
  flutter_highlight: ^0.7.0
  markdown: ^7.3.1
  highlight: ^0.7.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/avatar/
    - assets/default_roles.json
